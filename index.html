<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Premium Calculator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="calculator">
    <!-- Top controls -->
    <div class="top-grid">
      <button class="top-btn" id="angleBtn" onclick="toggleAngle()">DEG</button>
      <button class="top-btn" onclick="backspace()">⌫</button>
      <button class="top-btn" onclick="clearDisplay()">AC</button>
      <button class="top-btn" onclick="toggleHistory()">HIS</button>
      <button class="top-btn" onclick="saveHistory()">SAVE</button>

      <button class="top-btn" onclick="memoryClear()">MC</button>
      <button class="top-btn" onclick="memoryAdd()">M+</button>
      <button class="top-btn" onclick="memorySubtract()">M-</button>
      <button class="top-btn" onclick="memoryRecall()">MR</button>
      <button class="top-btn" onclick="startVoice()">🎤</button>
    </div>

    <!-- Display -->
    <input type="text" id="display" readonly />

    <!-- Main buttons -->
    <div class="grid">
      <button onclick="append('(')">(</button>
      <button onclick="append(')')">)</button>
      <button onclick="percent()">%</button>
      <button class="op" onclick="append('/')">÷</button>
      <button onclick="appendPi()">π</button>

      <button onclick="append('7')">7</button>
      <button onclick="append('8')">8</button>
      <button onclick="append('9')">9</button>
      <button class="op" onclick="append('*')">×</button>
      <button onclick="sqrtFunc()">√</button>

      <button onclick="append('4')">4</button>
      <button onclick="append('5')">5</button>
      <button onclick="append('6')">6</button>
      <button class="op" onclick="append('-')">−</button>
      <button onclick="square()">x²</button>

      <button onclick="append('1')">1</button>
      <button onclick="append('2')">2</button>
      <button onclick="append('3')">3</button>
      <button class="op" onclick="append('+')">+</button>
      <button onclick="cube()">x³</button>

      <button onclick="append('0')">0</button>
      <button onclick="append('00')">00</button>
      <button onclick="append('.')">.</button>
      <button class="equal" onclick="calculate()">=</button>
      <button onclick="cuberoot()">∛</button>

      <button onclick="sinFunc()">sin</button>
      <button onclick="cosFunc()">cos</button>
      <button onclick="tanFunc()">tan</button>
      <button onclick="logFunc()">log</button>
      <button onclick="lnFunc()">ln</button>

      <button onclick="powerMode()">xʸ</button>
      <button onclick="factorialClick()">x!</button>
      <button onclick="toggleSign()">±</button>
      <button onclick="reciprocal()">1/x</button>
      <button onclick="expFunc()">EXP</button>

      <button onclick="toggleTheme()">☀️</button>
      <button onclick="append('**')">**</button>
      <button onclick="append('%')">mod</button>
      <button onclick="append(' ')">space</button>
      <button onclick="clearHistory()">CLR-H</button>
    </div>

    <!-- Scrollable history -->
    <div id="historyPanel" class="history-panel"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
